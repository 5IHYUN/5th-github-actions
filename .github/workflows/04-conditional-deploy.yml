name: Conditional Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "배포 대상"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
          - both

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      target_input: ${{ steps.set.outputs.value }}
    steps:
      - name: 입력값 저장
        id: set
        run: |
          echo "value=${{ inputs.target }}" >> $GITHUB_OUTPUT
          echo "선택된 타겟: ${{ inputs.target }}"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: prepare
    if: inputs.target == 'staging' || inputs.target == 'both'
    steps:
      - name: staging 배포
        run: |
          echo "스테이징 배포: ${{ needs.prepare.outputs.target_input }}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: prepare
    if: inputs.target == 'production' || inputs.target == 'both'
    steps:
      - name: production 배포
        run: |
          echo "프로덕션 배포: ${{ needs.prepare.outputs.target_input }}"

  production-verify:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: inputs.target == 'both'
    steps:
      - name: 추가 검증
        run: |
          echo "프로덕션 추가 검증 실행"

  summary:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, production-verify]
    if: always()
    steps:
      - name: 결과 요약
        run: |
          echo "=== 실행 결과 요약 ==="
          echo "Target: ${{ inputs.target }}"
          echo "Staging: ${{ needs.deploy-staging.result }}"
          echo "Production: ${{ needs.deploy-production.result }}"
          echo "Verify: ${{ needs.production-verify.result }}"
